name: Java DevSecOps Pipeline

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  devsecops:
    name: Build, Test & Security Scan
    runs-on: ubuntu-latest

    steps:

    #---------------------------------------------------------
    # Checkout Source Code
    #---------------------------------------------------------
    - name: Checkout Repository
      uses: actions/checkout@v4

    #---------------------------------------------------------
    # Setup Java
    #---------------------------------------------------------
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'
        cache: maven

    #---------------------------------------------------------
    # Verify Maven Installation
    #---------------------------------------------------------
    - name: Verify Maven
      run: mvn -version

    #---------------------------------------------------------
    # Build Project
    #---------------------------------------------------------
    - name: Build Project
      run: mvn clean compile

    #---------------------------------------------------------
    # Run Unit Tests
    #---------------------------------------------------------
    - name: Run Unit Tests
      run: mvn test
      continue-on-error: true

    #---------------------------------------------------------
    # Generate JaCoCo Coverage
    #---------------------------------------------------------
    - name: Generate JaCoCo Report
      run: mvn jacoco:report
      continue-on-error: true

    #---------------------------------------------------------
    # Checkstyle
    #---------------------------------------------------------
    - name: Checkstyle Scan
      run: mvn checkstyle:check
      continue-on-error: true

    #---------------------------------------------------------
    # PMD
    #---------------------------------------------------------
    - name: PMD Scan
      run: mvn pmd:check
      continue-on-error: true

    #---------------------------------------------------------
    # SpotBugs
    #---------------------------------------------------------
    - name: SpotBugs Scan
      run: mvn spotbugs:check
      continue-on-error: true

    #---------------------------------------------------------
    # Secret Scan - Gitleaks
    #---------------------------------------------------------
    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      continue-on-error: true

    #---------------------------------------------------------
    # Trivy Filesystem Scan
    #---------------------------------------------------------
    - name: Trivy Filesystem Scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .
        format: table
      continue-on-error: true

    #---------------------------------------------------------
    # Build Docker Image
    #---------------------------------------------------------
    - name: Build Docker Image
      run: docker build -t simple-java-project:${{ github.sha }} .
      continue-on-error: true

    #---------------------------------------------------------
    # Scan Docker Image
    #---------------------------------------------------------
    - name: Trivy Docker Image Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: simple-java-project:${{ github.sha }}
        format: table
      continue-on-error: true

    #---------------------------------------------------------
    # Upload Reports
    #---------------------------------------------------------
    - name: Upload Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: DevSecOps-Reports
        path: |
          target/site/**
          target/surefire-reports/**
          target/*.jar
