name: Java DevSecOps Pipeline

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  devsecops:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:

    ############################################################
    # Checkout
    ############################################################

    - name: Checkout Repository
      uses: actions/checkout@v4

    ############################################################
    # Setup Java
    ############################################################

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        cache: maven

    ############################################################
    # Build
    ############################################################

    - name: Build Project
      run: mvn clean compile

    ############################################################
    # Unit Tests
    ############################################################

    - name: Run Unit Tests
      run: mvn test
      continue-on-error: true

    ############################################################
    # JaCoCo
    ############################################################

    - name: Generate Code Coverage
      run: mvn jacoco:report
      continue-on-error: true

    ############################################################
    # Checkstyle
    ############################################################

    - name: Checkstyle Scan
      run: mvn checkstyle:check
      continue-on-error: true

    ############################################################
    # PMD
    ############################################################

    - name: PMD Scan
      run: mvn pmd:check
      continue-on-error: true

    ############################################################
    # SpotBugs
    ############################################################

    - name: SpotBugs Scan
      run: mvn spotbugs:check
      continue-on-error: true

    ############################################################
    # Gitleaks
    ############################################################

    - name: Secret Scan
      uses: gitleaks/gitleaks-action@v2
      continue-on-error: true

    ############################################################
    # Trivy Filesystem Scan
    ############################################################

    - name: Trivy Filesystem Scan
      uses: aquasecurity/trivy-action@0.28.0
      with:
        scan-type: fs
        scan-ref: .
        format: table
      continue-on-error: true

    ############################################################
    # Docker Build
    ############################################################

    - name: Build Docker Image
      run: docker build -t java-app:${{ github.sha }} .
      continue-on-error: true

    ############################################################
    # Docker Image Scan
    ############################################################

    - name: Trivy Docker Image Scan
      uses: aquasecurity/trivy-action@0.28.0
      with:
        image-ref: java-app:${{ github.sha }}
        format: table
      continue-on-error: true

    ############################################################
    # Upload Reports
    ############################################################

    - name: Upload Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: DevSecOps-Reports
        path: |
          target/site
          target/surefire-reports
